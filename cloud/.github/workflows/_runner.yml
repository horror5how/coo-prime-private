name: COO-Prime Routine Runner (reusable)

on:
  workflow_call:
    inputs:
      routine_id:
        required: true
        type: string
      tier:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      COO_PRIME_SIGNING_KEY:
        required: true
      GH_TOKEN:
        required: false
      VERCEL_TOKEN:
        required: false
      LINKEDIN_TOKEN:
        required: false
      SUPABASE_ACCESS_TOKEN:
        required: false
      GMAIL_TOKEN:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Agent SDK
        run: npm i -g @anthropic-ai/claude-agent-sdk

      - name: Dispatch routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COO_PRIME_SIGNING_KEY: ${{ secrets.COO_PRIME_SIGNING_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          ROUTINE_ID: ${{ inputs.routine_id }}
          TIER: ${{ inputs.tier }}
        run: |
          node scripts/dispatch-routine.mjs "$ROUTINE_ID"

      - name: Commit audit + QA artifacts
        run: |
          git config user.name "coo-prime-bot"
          git config user.email "coo-prime@users.noreply.github.com"
          git add audit.log qa/ incidents/ state.json || true
          if ! git diff --staged --quiet; then
            git commit -m "coo-prime: ${{ inputs.routine_id }} $(date -u +%FT%TZ)"
            git push
          fi
