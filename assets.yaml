      role: Beyond Elevation website + content pipeline
      governance: managed
      stack:
        - HTML
        - Vercel
      workflows:
        - path: .github/workflows/auto-merge-scheduled-posts.yml
          name: Auto-merge scheduled-task blog posts into main
          state: active
          coo_policy: observe
          failure_incident: open_incident_on_fail
        - path: .github/workflows/daily-digest.yml
          name: Daily AI & GitHub Digest Email
          state: active
          coo_policy: observe
          note: Overlaps with COO-Prime's reporting charter. Review for consolidation.
          failure_incident: open_incident_on_fail
        - path: .github/workflows/deploy.yml
          name: Deploy to Vercel Production
          state: active
          coo_policy: observe_and_rollback
          failure_incident: open_incident_on_fail
    - name: purpose-ai-mvp
      visibility: private
      role: Purpose AI MVP — TypeScript product
      governance: managed
      stack:
        - TypeScript
      workflows:
        - path: .github/workflows/ci.yml
          name: CI
          state: active
          coo_policy: observe
          failure_incident: open_incident_on_fail
