name: coo-linkedin-publisher

# Publishes to LinkedIn via the native REST API (Images + Posts).
# GitHub Actions runners have unrestricted egress to api.linkedin.com,
# unlike the Claude Code Cloud sandbox whose egress proxy blocks it.
#
# Entry points:
#   workflow_dispatch   — manual: content_body + image_url
#   repository_dispatch — programmatic payload { content_body, image_url, alt, visibility }

on:
  workflow_dispatch:
    inputs:
      content_body:
        description: "Post caption text"
        required: true
        type: string
      image_url:
        description: "Public image URL (leave blank for text-only)"
        required: false
        type: string
        default: ""
      alt:
        description: "Image alt text"
        required: false
        type: string
        default: ""
      visibility:
        description: "PUBLIC or CONNECTIONS"
        required: false
        type: string
        default: "PUBLIC"
  repository_dispatch:
    types: [linkedin-publish, linkedin-publisher]

concurrency:
  group: coo-linkedin-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve inputs (dispatch vs repository_dispatch)
        id: inp
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_BODY: ${{ inputs.content_body }}
          MANUAL_IMAGE: ${{ inputs.image_url }}
          MANUAL_ALT: ${{ inputs.alt }}
          MANUAL_VIS: ${{ inputs.visibility }}
          RD_BODY: ${{ github.event.client_payload.content_body }}
          RD_IMAGE: ${{ github.event.client_payload.image_url }}
          RD_ALT: ${{ github.event.client_payload.alt }}
          RD_VIS: ${{ github.event.client_payload.visibility }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            BODY="$RD_BODY"; IMAGE="$RD_IMAGE"; ALT="$RD_ALT"; VIS="${RD_VIS:-PUBLIC}"
          else
            BODY="$MANUAL_BODY"; IMAGE="$MANUAL_IMAGE"; ALT="$MANUAL_ALT"; VIS="${MANUAL_VIS:-PUBLIC}"
          fi
          if [ -z "$BODY" ]; then echo "content_body required" >&2; exit 1; fi
          {
            echo "body<<LIEOF"
            printf '%s\n' "$BODY"
            echo "LIEOF"
          } >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"    >> "$GITHUB_OUTPUT"
          echo "alt=$ALT"        >> "$GITHUB_OUTPUT"
          echo "visibility=$VIS" >> "$GITHUB_OUTPUT"

      - name: Publish via native LinkedIn API
        id: publish
        env:
          LI_TOKEN: ${{ secrets.LI_TOKEN }}
          LI_URN:   ${{ secrets.LI_URN }}
          BODY:     ${{ steps.inp.outputs.body }}
          IMAGE:    ${{ steps.inp.outputs.image }}
          ALT:      ${{ steps.inp.outputs.alt }}
          VIS:      ${{ steps.inp.outputs.visibility }}
        run: |
          set -e
          if [ -z "$LI_TOKEN" ] || [ -z "$LI_URN" ]; then
            echo "::error::LI_TOKEN and/or LI_URN not configured in coo-prime-private secrets"
            echo "status=blocked_oauth" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ -n "$IMAGE" ]; then
            printf '%s' "$BODY" | node scripts/linkedin-publish.mjs --image "$IMAGE" --alt "$ALT" --visibility "$VIS" | tee /tmp/li.out
            echo "status=success_image" >> "$GITHUB_OUTPUT"
            echo "post_url=$(grep -oE 'https://www.linkedin.com[^ ]*' /tmp/li.out | head -1)" >> "$GITHUB_OUTPUT"
          else
            # text-only via Posts API
            BODY_JSON=$(node -e 'console.log(JSON.stringify(process.env.BODY))')
            cat > /tmp/li.json <<JSON
          {"author":"$LI_URN","commentary":$BODY_JSON,"visibility":"$VIS","distribution":{"feedDistribution":"MAIN_FEED","targetEntities":[],"thirdPartyDistributionChannels":[]},"lifecycleState":"PUBLISHED","isReshareDisabledByAuthor":false}
          JSON
            RESP=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $LI_TOKEN" \
              -H "Linkedin-Version: 202604" \
              -H "X-Restli-Protocol-Version: 2.0.0" \
              -H "Content-Type: application/json" \
              -d @/tmp/li.json https://api.linkedin.com/rest/posts)
            CODE=$(echo "$RESP" | tail -n1)
            if [ "$CODE" != "201" ] && [ "$CODE" != "200" ]; then
              echo "::error::LinkedIn text post failed: HTTP $CODE"
              echo "$RESP" | head -n-1
              exit 1
            fi
            echo "status=success_text" >> "$GITHUB_OUTPUT"
          fi

      - name: Append signed audit entry
        if: always()
        env:
          COO_PRIME_SIGNING_KEY: ${{ secrets.COO_PRIME_SIGNING_KEY }}
          STATUS: ${{ steps.publish.outputs.status }}
          POST_URL: ${{ steps.publish.outputs.post_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node -e "
            const fs=require('fs'), c=require('crypto');
            const key=process.env.COO_PRIME_SIGNING_KEY;
            const lines=fs.existsSync('audit.log')?fs.readFileSync('audit.log','utf8').trim().split('\n').filter(Boolean):[];
            const prev=lines.length?'sha256:'+c.createHash('sha256').update(lines[lines.length-1]).digest('hex'):'sha256:'+'0'.repeat(64);
            const rec={
              ts:new Date().toISOString(),actor:'COO-Prime',action:'routine.dispatch',
              target:'linkedin-publisher',tier:'C',runtime:'cloud:github-actions',
              result: process.env.JOB_STATUS==='success'?'success':'failure',
              duration_ms:0,prev_hash:prev,
              notes:'status='+(process.env.STATUS||'unknown')+' post_url='+(process.env.POST_URL||'-'),
            };
            if(key)rec.signature='hmac-sha256:'+c.createHmac('sha256',key).update(JSON.stringify(rec)).digest('hex');
            fs.appendFileSync('audit.log',JSON.stringify(rec)+'\n');
          "
          git config user.name "coo-prime-bot"
          git config user.email "coo-prime@users.noreply.github.com"
          git add audit.log || true
          git diff --staged --quiet && exit 0
          git commit -m "coo-prime: linkedin-publisher $(date -u +%FT%TZ)" || exit 0
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main; git reset --hard origin/main; sleep 2
          done
