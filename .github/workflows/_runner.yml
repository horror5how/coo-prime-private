name: COO-Prime Routine Runner (reusable)

on:
  workflow_call:
    inputs:
      routine_id:
        required: true
        type: string
      tier:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Dispatch routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COO_PRIME_SIGNING_KEY: ${{ secrets.COO_PRIME_SIGNING_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          ROUTINE_ID: ${{ inputs.routine_id }}
          TIER: ${{ inputs.tier }}
          GITHUB_REPO: ${{ github.repository }}
        run: node scripts/dispatch-routine.mjs "$ROUTINE_ID"

      - name: Commit artifacts
        if: always()
        run: |
          git config user.name "coo-prime-bot"
          git config user.email "coo-prime@users.noreply.github.com"
          git add audit.log qa/ incidents/ state.json assets.yaml 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "coo-prime: ${{ inputs.routine_id }} $(date -u +%FT%TZ)"
            git push
          else
            echo "no artifact changes to commit"
          fi
