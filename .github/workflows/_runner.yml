name: COO-Prime Routine Runner (reusable)

on:
  workflow_call:
    inputs:
      routine_id:
        required: true
        type: string
      tier:
        required: true
        type: string

concurrency:
  group: coo-prime-dispatch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Dispatch routine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COO_PRIME_SIGNING_KEY: ${{ secrets.COO_PRIME_SIGNING_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          ROUTINE_ID: ${{ inputs.routine_id }}
          TIER: ${{ inputs.tier }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -e
          node scripts/dispatch-routine.mjs "$ROUTINE_ID" || EXIT=$?
          echo "==== post-dispatch workspace state ===="
          wc -l audit.log 2>/dev/null || echo "audit.log missing"
          ls -la qa/ 2>/dev/null | head
          git status --short
          exit ${EXIT:-0}

      - name: Commit artifacts
        if: always()
        run: |
          git config user.name "coo-prime-bot"
          git config user.email "coo-prime@users.noreply.github.com"
          for f in audit.log state.json assets.yaml; do
            [ -f "$f" ] && git add "$f" || true
          done
          [ -d qa ] && git add qa/ || true
          [ -d incidents ] && git add incidents/ || true
          if git diff --staged --quiet; then
            echo "no artifact changes to commit"
            exit 0
          fi
          git commit -m "coo-prime: ${{ inputs.routine_id }} $(date -u +%FT%TZ)"
          # Retry loop for concurrent push conflicts
          for attempt in 1 2 3 4 5 6; do
            if git push origin HEAD:main 2>&1; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed; rebasing on origin/main..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase failed"; exit 1; }
            sleep $((RANDOM % 4 + 1))
          done
          echo "push failed after 6 attempts"
          exit 1
