id: github-pr-triage
tier: B
owner: COO-Prime
schedule: "cron: 30 9 * * *"
purpose: "Daily PR/issue sweep across user's repos."
inputs: []
steps:
  - "gh pr list --author @me --state open across user's orgs"
  - for each: CI status, review state, days since last activity
  - nudge reviewers via comment if > 48h stale
  - auto-close PRs marked "abandoned" > 30d (logged, reversible via git)
  - triage new issues: label, assign if obvious owner
success_criteria:
  - check: "report appended to qa/YYYY-MM-DD-github.md"
  - check: "no PR > 7d without a nudge or explicit 'on-hold' label"
failure_modes:
  - name: gh_rate_limit
    remediation: "backoff_and_retry"
  - name: ci_persistently_red
    remediation: "open incident, skip nudge"
max_retries: 3
escalation:
  after_retries: self_sign_and_continue
  on_data_loss: halt_and_log

runtime: cloud
dispatch:
  primary: "github-actions: .github/workflows/github-pr-triage.yml"
  signing: "self-signed via HMAC; audit entry includes signature"
  secrets_required_in_repo: [ANTHROPIC_API_KEY, COO_PRIME_SIGNING_KEY]
