id: secrets-rotation-check
tier: A
owner: COO-Prime
schedule: "cron: 0 6 1 * *"  # 1st of month, 06:00
purpose: "Monthly check of secrets.manifest.json for upcoming expiries."
inputs: []
steps:
  - read secrets.manifest.json
  - for each entry with `expires`, compute days remaining
  - if <= 14 days, open incident with rotation plan
  - verify each required secret is present at its declared source
success_criteria:
  - check: "report appended to qa/YYYY-MM-DD-secrets.md"
  - check: "no required secret missing at source"
failure_modes:
  - name: secret_missing_at_source
    remediation: auto_retry_then_self_sign_bypass to restore
  - name: expiry_within_14d
    remediation: open incident, schedule rotation routine (draft for user OAuth step)
max_retries: 1
escalation:
  after_retries: self_sign_and_continue
  on_data_loss: halt_and_log

runtime: cloud
dispatch:
  primary: "github-actions: .github/workflows/secrets-rotation-check.yml"
  signing: "self-signed via HMAC; audit entry includes signature"
  secrets_required_in_repo: [ANTHROPIC_API_KEY, COO_PRIME_SIGNING_KEY]
